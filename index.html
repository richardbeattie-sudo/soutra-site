<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soutra</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;       /* Pure Black */
            --text: #a0a0a0;     /* Mid Grey */
            --highlight: #ffffff; /* White for the logo/button */
            --border: #333333;   /* Dark Grey border */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Silkscreen', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.4;
        }

        .card {
            width: 100%;
            max-width: 480px;
            border: 2px solid var(--border);
            padding: 40px;
            background: var(--bg);
            box-shadow: 10px 10px 0px 0px #1a1a1a;
        }

        .logo {
            font-size: 40px;
            letter-spacing: -3px;
            margin-bottom: 10px;
            display: block;
            color: var(--highlight);
            text-transform: lowercase;
        }

        .role {
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: var(--text);
            letter-spacing: 1px;
        }

        .statement {
            font-size: 15px;
            margin-bottom: 40px;
            color: var(--text);
            border-left: 2px solid var(--border);
            padding-left: 20px;
        }

        .btn {
            display: inline-block;
            border: 2px solid var(--highlight);
            color: var(--highlight);
            padding: 10px 30px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.1s;
        }

        .btn:hover {
            background: var(--highlight);
            color: var(--bg);
        }

        .btn:active {
            transform: translate(2px, 2px);
        }

        footer {
            margin-top: 50px;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.4;
        }

        @media (max-width: 480px) {
            .logo { font-size: 32px; }
            .card { padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="logo">soutra</span>
        
        <div class="role">Chair / NED / Advisor</div>
        
        <p class="statement">
            Helping founders build companies investors want to back — and boards want to run.
        </p>

        <a href="mailto:richard@soutra.net?subject=Website%20Enquiry" class="btn">CONTACT</a>

        <footer>
            SOUTRA LTD // 2026
        </footer>
    </div>

</body>
</html>
